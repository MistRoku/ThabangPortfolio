<div class="card">
  <div class="card-img" [style.backgroundImage]="'url(' + project.imageUrl + ')'"></div>
  <div class="card-content">
    <h3>{{ project.title }}</h3>
    <p class="tech">{{ project.techStack }}</p>
    <p>{{ project.description }}</p>
    <div class="highlight">{{ project.highlight }}</div>
  </div>
</div>
